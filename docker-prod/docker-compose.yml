name: dev47
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        GIT_BRANCH: ${GIT_BRANCH:-main}
    container_name: dev47-frontend
    restart: unless-stopped
    networks:
      - web-network
      - default

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        GIT_BRANCH: ${GIT_BRANCH:-main}
    container_name: dev47-backend
    environment:
      - FLASK_ENV=production
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://amankayare.com}
      - CORS_ORIGINS=${FRONTEND_ORIGIN:-https://amankayare.com}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - EMAIL_SERVICE_URL=${EMAIL_SERVICE_URL}
      - EMAIL_SERVICE_API_KEY=${EMAIL_SERVICE_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web-network
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${POSTGRES_USER:-portfolio_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  web-network:
    external: true   # created and owned by Global-Proxy
  default:
    driver: bridge

volumes:
  backend_uploads:
  postgres_data:
