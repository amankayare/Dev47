services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        GIT_BRANCH: ${GIT_BRANCH:-main}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-amankayare.com}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        GIT_BRANCH: ${GIT_BRANCH:-main}
    environment:
      - FLASK_ENV=production
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://amankayare.com}
      - CORS_ORIGINS=${FRONTEND_ORIGIN:-https://amankayare.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${POSTGRES_USER:-portfolio_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio_user} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  backend_uploads:
  postgres_data:
