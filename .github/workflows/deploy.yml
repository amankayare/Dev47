name: Deploy to Hostinger VPS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string
      rebuild_target:
        description: 'What to rebuild'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - caddy

concurrency:
  group: deploy
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. SSH into VPS and deploy ─────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_BRANCH,REBUILD_TARGET
          script_stop: true
          script: |
            set -euo pipefail
            
            echo ">>> Pulling latest deployment script..."
            cd /opt/Dev47
            git fetch origin
            git checkout "${DEPLOY_BRANCH}"
            git pull origin "${DEPLOY_BRANCH}"
            
            echo ">>> Executing deployment script..."
            chmod +x docker-prod/deploy.sh
            bash docker-prod/deploy.sh "${REBUILD_TARGET}" "${DEPLOY_BRANCH}"
        env:
          DEPLOY_BRANCH:  ${{ github.event.inputs.branch }}
          REBUILD_TARGET: ${{ github.event.inputs.rebuild_target }}
